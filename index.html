<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野球魂A 金書驗血模擬器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #draw-btn {
            background: linear-gradient(to bottom, #ffae00, #ff7b00);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, filter 0.2s;
            margin-bottom: 30px;
            z-index: 10;
        }

        #draw-btn:hover {
            filter: brightness(1.1);
        }

        #draw-btn:active {
            transform: scale(0.95);
        }

        #draw-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 800px;
            z-index: 5;
        }

        .card {
            width: 100px;
            height: 140px;
            perspective: 1000px;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .card-front {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: rgba(255, 255, 255, 0.5);
            border: 2px solid #2980b9;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* ======= S卡設定與閃電特效 ======= */
        .rank-S {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            border: 3px solid #ffe600;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        /* S卡翻開時的強烈黃金放電動畫 */
        .card.flipped .rank-S {
            animation: lightningGlow 0.8s ease-out forwards;
        }

        @keyframes lightningGlow {
            0% { box-shadow: 0 0 0px #fff; filter: brightness(2); }
            20% { box-shadow: 0 0 30px #ffd700, 0 0 60px #fff; filter: brightness(1.5); }
            40% { box-shadow: 0 0 15px #ff8c00, 0 0 40px #ffd700; filter: brightness(1.2); }
            60% { box-shadow: 0 0 35px #ffd700, 0 0 70px #fff; filter: brightness(1.4); }
            100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); filter: brightness(1); }
        }

        /* 閃電線條容器 */
        .lightning-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 2;
        }

        /* 當卡片被翻開且是S卡時，顯示閃電線條 */
        .card.flipped .lightning-effect {
            display: block;
        }

        /* 模擬四周集中到中央的閃電線條 */
        .lightning-bolt {
            position: absolute;
            background: #fff;
            box-shadow: 0 0 8px #ffd700, 0 0 15px #fff;
            opacity: 0;
        }

        .bolt-1 { top: -20px; left: 50%; width: 3px; height: 40px; transform: translateX(-50%); animation: boltInY 0.4s ease-in-out forwards; }
        .bolt-2 { bottom: -20px; left: 50%; width: 3px; height: 40px; transform: translateX(-50%); animation: boltInY 0.4s ease-in-out open forwards; }
        .bolt-3 { top: 50%; left: -20px; width: 40px; height: 3px; transform: translateY(-50%); animation: boltInX 0.4s ease-in-out forwards; }
        .bolt-4 { top: 50%; right: -20px; width: 40px; height: 3px; transform: translateY(-50%); animation: boltInX 0.4s ease-in-out forwards; }

        @keyframes boltInY {
            0% { opacity: 1; transform: translate(-50%, 0) scaleY(1); }
            100% { opacity: 0; transform: translate(-50%, 20px) scaleY(0); }
        }

        @keyframes boltInX {
            0% { opacity: 1; transform: translate(0, -50%) scaleX(1); }
            100% { opacity: 0; transform: translate(20px, -50%) scaleX(0); }
        }

        /* ======= A卡設定 ======= */
        .rank-A {
            background: linear-gradient(135deg, #ff4e50, #c0392b);
            color: #fff;
            border: 2px solid #e74c3c;
        }

        /* ======= B卡設定 (修改為亮藍色) ======= */
        .rank-B {
            background: linear-gradient(135deg, #4aa3df, #2575fc);
            color: #ffffff;
            border: 2px solid #1e62d0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            box-shadow: 0 0 5px rgba(37, 117, 252, 0.4);
        }

        /* ======= 結算與響應式 ======= */
        .result-summary {
            background-color: #333;
            padding: 20px 40px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #555;
            animation: fadeIn 0.5s ease-in;
            z-index: 5;
        }

        .result-summary h3 {
            margin-top: 0;
            color: #4CAF50;
        }

        .result-item {
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }

        .s-text { color: #ffd700; }
        .a-text { color: #ff4e50; }
        .b-text { color: #54b4ff; } /* 結算文字也同步改藍色 */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .card-container {
                grid-template-columns: repeat(5, 1fr);
                gap: 5px;
            }
            .card {
                width: 60px;
                height: 84px;
            }
            .card-front, .card-back {
                font-size: 24px;
            }
            .bolt-1, .bolt-2 { height: 20px; }
            .bolt-3, .bolt-4 { width: 20px; }
        }
    </style>
</head>
<body>

    <h1>⚾ 野球魂A 金書驗血模擬器 ⚾</h1>
    <button id="draw-btn">抽 10 連！</button>
    
    <div id="card-container" class="card-container"></div>
    <div id="result-summary" class="result-summary" style="display: none;"></div>

    <script>
        const PROB_S = 0.025;
        const PROB_A = 0.085;
        const PROB_B = 0.890;

        function drawCardRank() {
            const rand = Math.random();
            if (rand < PROB_S) return 'S';
            if (rand < PROB_S + PROB_A) return 'A';
            return 'B';
        }

        document.getElementById('draw-btn').addEventListener('click', () => {
            const container = document.getElementById('card-container');
            const summary = document.getElementById('result-summary');
            const btn = document.getElementById('draw-btn');

            container.innerHTML = '';
            summary.style.display = 'none';
            btn.disabled = true;

            let results = { S: 0, A: 0, B: 0 };
            let cards = [];

            for (let i = 0; i < 10; i++) {
                const rank = drawCardRank();
                results[rank]++;
                cards.push(rank);

                const cardEl = document.createElement('div');
                cardEl.className = 'card';
                
                // 如果是 S 卡，額外塞入 4 條往內集中的閃電特效線條
                let lightningHTML = '';
                if (rank === 'S') {
                    lightningHTML = `
                        <div class="lightning-effect">
                            <div class="lightning-bolt bolt-1"></div>
                            <div class="lightning-bolt bolt-2"></div>
                            <div class="lightning-bolt bolt-3"></div>
                            <div class="lightning-bolt bolt-4"></div>
                        </div>
                    `;
                }

                cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back rank-${rank}">
                            ${rank}
                            ${lightningHTML}
                        </div>
                    </div>
                `;
                container.appendChild(cardEl);
            }

            cards.forEach((rank, index) => {
                setTimeout(() => {
                    container.children[index].classList.add('flipped');

                    if (index === 9) {
                        setTimeout(() => {
                            showSummary(results);
                            btn.disabled = false;
                        }, 1000); // 稍微拉長一點點等待時間，讓S卡特效完美跑完
                    }
                }, index * 300); 
            });
        });

        function showSummary(results) {
            const summary = document.getElementById('result-summary');
            
            let titleText = "抽卡結果統計";
            if (results.S >= 2) titleText = "⚡ 歐洲血統覺醒！神抽！ ⚡";
            else if (results.S === 1) titleText = "🎉 恭喜出 S 卡！成功驗血！ 🎉";
            else titleText = "🌚 非洲大草原歡迎你... 🌚";

            summary.innerHTML = `
                <h3>${titleText}</h3>
                <div class="result-item s-text">S 級卡片：${results.S} 張 (機率 2.5%)</div>
                <div class="result-item a-text">A 級卡片：${results.A} 張 (機率 8.5%)</div>
                <div class="result-item b-text">B 級卡片：${results.B} 張 (機率 89%)</div>
            `;
            summary.style.display = 'block';
        }
    </script>
</body>
</html>
