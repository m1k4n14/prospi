<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>野球魂A 金書驗血模擬器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            overflow-x: hidden;
        }

        h1 {
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        #draw-btn {
            background: linear-gradient(to bottom, #ffae00, #ff7b00);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s, filter 0.2s;
            margin-bottom: 30px;
            z-index: 10;
        }

        #draw-btn:hover {
            filter: brightness(1.1);
        }

        #draw-btn:active {
            transform: scale(0.95);
        }

        #draw-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            max-width: 800px;
            z-index: 5;
        }

        .card {
            width: 100px;
            height: 140px;
            perspective: 1000px;
            position: relative;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .card-front {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: rgba(255, 255, 255, 0.5);
            border: 2px solid #2980b9;
        }

        .card-back {
            transform: rotateY(180deg);
        }

        /* ======= S卡設定與閃電特效 ======= */
        .rank-S {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            border: 3px solid #ffe600;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        /* S卡翻開時的強烈黃金放電動畫 */
        .card.flipped .rank-S {
            animation: lightningGlow 0.8s ease-out forwards;
        }

            0% { box-shadow: 0 0 0px #fff; filter
